# CI — 跨平台协作自动化门禁
# 详见 docs/00-dev-constitution.md §11.7、AGENTS.md 核心规则 9、CONTRIBUTING.md
#
# 拦截：
# - 类型错误 / Lint 失败 / 测试失败 / Zod 数据校验失败
# - 非 UTF-8 编码的 JSON / Markdown 文本资产（防 Windows GBK 乱码入库）
# - 武将传记 / 静态数据字符集异常
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Campaign engine integration test
        run: pnpm verify-campaign

      - name: Save entity schema integration test
        run: pnpm verify-save-entities

      - name: Save campaign schema integration test
        run: pnpm verify-save-campaign

      - name: Save battle schema integration test
        run: pnpm verify-save-battle

      - name: Save diplomacy schema integration test
        run: pnpm verify-save-diplomacy

      - name: Save intel schema integration test
        run: pnpm verify-save-intel

      - name: Save plot schema integration test
        run: pnpm verify-save-plot

      - name: Complete game-state schema integration test
        run: pnpm verify-save-game-state

      - name: Save migration dispatch integration test
        run: pnpm verify-save-migration

      - name: Battle deterministic continuation test
        run: pnpm verify-battle-rng

      - name: Duel deterministic continuation test
        run: pnpm verify-duel-rng

      - name: Civil deterministic continuation test
        run: pnpm verify-civil-rng

      - name: Zod data validation
        run: pnpm validate-data

      - name: 编码门禁（UTF-8 no BOM）
        run: |
          set -e
          fail=0
          for f in $(find server/src/data shared/data docs/biographies \
                     -type f \( -name '*.json' -o -name '*.md' -o -name '*.ts' \) 2>/dev/null); do
            enc=$(file --mime-encoding "$f" | awk -F': ' '{print $2}' | tr -d ' ')
            if [ "$enc" != "utf-8" ] && [ "$enc" != "us-ascii" ]; then
              echo "FAIL: $f 编码为 [$enc]，必须 UTF-8 (no BOM)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "✔ 所有文本资产编码合规（UTF-8 no BOM）"
