name: Bug report
description: Report a reproducible defect in the current implementation
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please do not report security vulnerabilities here; follow SECURITY.md.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include scenario, faction, actions, and the smallest reproducible sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, browser, commit or release
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
